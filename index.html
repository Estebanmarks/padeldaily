<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daily Padel</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=5">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png?v=5">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=5">
  <link rel="icon" href="/favicon.svg?v=5" type="image/svg+xml">
  <link rel="stylesheet" href="./styles.css?v=5">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-3LWCW1JSFP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-3LWCW1JSFP');
  </script>
</head>
<body>
  <main class="container">
    <header class="top">
      <div class="brand">
        <div class="brand-icon">🎾</div>
        <h1>Daily Padel</h1>
      </div>
      <div class="top-right">
        <p class="top-tags" id="topTags">FOCO • PLAN • MEJORA</p>
        <div class="lang-switch" aria-label="Language selector">
          <button type="button" class="lang-btn" id="langEs" data-lang="es" title="Español" aria-label="Español">
            <span class="flag flag-ar" aria-hidden="true"></span>
            <span class="sr-only">Español</span>
          </button>
          <button type="button" class="lang-btn" id="langEn" data-lang="en" title="English" aria-label="English">
            <span class="flag flag-us" aria-hidden="true"></span>
            <span class="sr-only">English</span>
          </button>
        </div>
      </div>
      <p class="subtitle" id="subtitle">Tu microlección diaria de Cuerpo, Mente y Táctica</p>
    </header>

    <section class="day-banner">
      <div class="day-week" id="dayWeek"></div>
      <div class="day-row">
        <span class="date-chip date-number" id="dayNumber"></span>
        <span class="de-label" id="connectorOne">de</span>
        <span class="date-chip date-month" id="dayMonth"></span>
        <span class="de-label" id="connectorTwo">de</span>
        <span class="date-chip date-year" id="dayYear"></span>
      </div>
      <div id="cycleLabel"></div>
    </section>

    <section class="cards" id="cards"></section>

    <div class="share-row">
      <a id="whatsappShare" class="whatsapp-share" href="#" target="_blank" rel="noopener noreferrer">
        <svg class="whatsapp-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.435 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        <span id="shareLabel">Compartir</span>
      </a>
    </div>

    <footer class="bottom-copy" id="bottomCopy">Cada día mejor, en la pista y en la vida.</footer>
  </main>

  <template id="cardTemplate">
    <article class="card">
      <div class="card-head">
        <div class="card-icon"></div>
      </div>
      <div class="card-main">
        <div class="card-label-row">
          <span class="badge"></span>
          <span class="lesson-level"></span>
          <span class="lesson-id"></span>
        </div>
        <h2 class="lesson-title"></h2>
        <p class="lesson-text"></p>
        <p class="lesson-exercise"></p>
      </div>
      <div class="card-arrow">›</div>
    </article>
  </template>

  <script src="./daily_messages_by_day.js?v=5" defer></script>
  <script src="./daily_messages_by_day_en.js?v=5" defer></script>
  <script src="./app.js?v=8" defer></script>
</body>
</html>
